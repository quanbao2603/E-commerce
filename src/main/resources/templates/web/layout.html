<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
      <meta charset="UTF-8">
      <title layout:title-pattern="$CONTENT_TITLE - Womtech">Womtech</title>

      <!-- Bootstrap 5 CSS (CDN) -->
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

      <!-- Bootstrap Icons (nếu bạn có dùng <i class="bi bi-facebook"></i>) -->
      <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

      <link rel="stylesheet" th:href="@{/css/web/header.css}">
      <link rel="stylesheet" th:href="@{/css/web/footer.css}">
</head>

<body>

      <!-- Header -->
      <div th:replace="~{web/fragments/header :: header}"></div>

      <!-- Nội dung -->
      <main class="container my-4" layout:fragment="content">
            Nội dung sẽ render ở đây
      </main>

      <!-- Footer -->
      <div th:replace="~{web/fragments/footer :: footer}"></div>

      <!-- Bootstrap 5 JS (bundle kèm Popper) -->
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>

      <script th:src="/web/js/header.js"></script>
</body>

</html>
